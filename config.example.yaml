# Personio Employee Export - configuration
#
# Copy this file to "config.yaml" and fill in your own values.
# Never commit config.yaml - it contains your API secret.

personio:
  # Base URL for the Personio API. Leave as-is unless told otherwise.
  base_url: "https://api.personio.de"

  # API credentials from Personio: Settings > Integrations > API credentials.
  # Leave these blank while running in mock mode.
  client_id: ""
  client_secret: ""

export:
  # Folder where the CSV files are written. Created automatically if missing.
  output_dir: "./output"

  # Output file names (schema is fixed by the payroll/reporting requirement).
  employee_file: "personio_employee_export.csv"
  summary_file: "department_summary.csv"

# When true, the tool uses bundled sample data instead of calling Personio.
# Great for a first run or a demo when you don't have credentials yet.
use_mock_data: true

# Mock mode only: when >0, generate this many realistic synthetic employees
# (many departments, several countries/currencies, mixed salary intervals) so a
# demo looks like a real company. Leave at 0 to use the small built-in sample.
mock_employee_count: 0

# Where to deliver the output files. Files are always written locally first.
#   type: local  -> leave them in the output folder (default)
#   type: sftp   -> also upload them to an SFTP server
delivery:
  type: "local"
  sftp:
    host: ""
    port: 22
    username: ""
    remote_dir: "."
    # Auth: set PERSONIO_SFTP_PASSWORD in .env, or point to a private key here.
    private_key_path: ""

# HR document export (live mode only). Uses the Personio v2 Document Management
# API, which needs the 'documents:read' scope on your API credential.
documents:
  enabled: false
  download_files: false   # false = metadata manifest only; true = also download files
